name: Tee Time Booker

on:
  schedule:
    - cron: '55 18 * * 6'   # 19:55 UTC every Saturday (adjust for BST — see below)
  workflow_dispatch:          # allows you to trigger it manually from GitHub too

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run booking scheduler
        env:
          IG_CLUB_URL:   ${{ secrets.IG_CLUB_URL }}
          IG_USERNAME:   ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:   ${{ secrets.IG_PASSWORD }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scheduler.py
